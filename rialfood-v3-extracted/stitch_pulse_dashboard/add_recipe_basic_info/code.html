<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ccff00",
                        "background-light": "#f8f8f5",
                        "background-dark": "#1f230f",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center">
<span class="material-symbols-outlined cursor-pointer">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Add Recipe</h2>
<div class="flex w-12 items-center justify-end">
<p class="text-primary text-sm font-bold leading-normal cursor-pointer">Save</p>
</div>
</div>
<!-- Progress Stepper -->
<div class="flex w-full flex-row items-center justify-center gap-4 py-6">
<div class="flex flex-col items-center gap-1">
<div class="h-2.5 w-12 rounded-full bg-primary"></div>
<span class="text-[10px] uppercase font-bold text-primary">Details</span>
</div>
<div class="flex flex-col items-center gap-1">
<div class="h-2.5 w-12 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<span class="text-[10px] uppercase font-bold text-slate-400">Steps</span>
</div>
<div class="flex flex-col items-center gap-1">
<div class="h-2.5 w-12 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<span class="text-[10px] uppercase font-bold text-slate-400">Finish</span>
</div>
</div>
<div class="px-4 flex flex-col gap-6">
<!-- Hero Image Upload Section -->
<div class="@container">
<div class="relative group">
<div class="w-full bg-slate-200 dark:bg-slate-800 rounded-xl min-h-[240px] flex flex-col items-center justify-center border-2 border-dashed border-slate-300 dark:border-slate-700 overflow-hidden relative" data-alt="A delicious colorful healthy salad bowl" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAwMZItrzWPkfk99MOofCK_ZXaF0bd78Lplt_63f7wT91zf6kdNZizjVQXxgjXF1fF8L4wyCmNgBOmmCRssMMzBc9frE_9aw6j98aa1pd8ub-eDm1-eYzfT2TG5wTyS715PlguQ9zSDM9TtXdrqXThN6C--40zK-PL-ij3jTMw-QeAioKnnxP5VmjLtv2_8Dq_jIkLYDgyfzVIycqXy99OdK8wXmlR9HsapyCPiyiqSXGgsKOcN7ecwLruc1OZfxhkYU0E_Ni93o5gu"); background-size: cover; background-position: center;'>
<div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center gap-3">
<div class="bg-primary text-background-dark p-3 rounded-full shadow-lg">
<span class="material-symbols-outlined text-2xl font-bold">photo_camera</span>
</div>
<span class="text-white font-bold text-sm">Change Cover Photo</span>
</div>
</div>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5">
<!-- Recipe Title -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-slate-600 dark:text-slate-400 px-1">Recipe Title</label>
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg p-4 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 placeholder-slate-500" placeholder="e.g. Avocado Zen Bowl" type="text"/>
</div>
<!-- Prep Time & Difficulty Row -->
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-slate-600 dark:text-slate-400 px-1">Prep Time</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">schedule</span>
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg p-4 pl-10 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 placeholder-slate-500" placeholder="20 min" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-slate-600 dark:text-slate-400 px-1">Difficulty</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">bar_chart</span>
<select class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg p-4 pl-10 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 appearance-none">
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>
</div>
</div>
</div>
<!-- Description (Additional Field for UI Completeness) -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold text-slate-600 dark:text-slate-400 px-1">Short Description</label>
<textarea class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg p-4 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 placeholder-slate-500 resize-none" placeholder="Share the story behind this recipe..." rows="3"></textarea>
</div>
</div>
</div>
<!-- Next Button Sticky Footer -->
<div class="mt-auto p-4 pb-8">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20">
<span>Continue to Ingredients</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
