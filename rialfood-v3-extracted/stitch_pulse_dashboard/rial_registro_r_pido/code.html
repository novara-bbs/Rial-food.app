<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RIAL Quick Log</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d4ff00", // Neon Vitality Lime
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                        "surface-dark": "#17222d",
                        "border-dark": "#243443",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Mobile Container -->
<div class="relative mx-auto min-h-screen max-w-md overflow-hidden bg-background-light dark:bg-background-dark flex flex-col">
<!-- Header / Top Bar -->
<header class="flex items-center justify-between p-6">
<div class="flex items-center gap-2">
<div class="h-8 w-8 rounded-lg bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-background-dark font-bold">bolt</span>
</div>
<h1 class="text-xl font-bold tracking-tight">RIAL</h1>
</div>
<button class="h-10 w-10 rounded-full border border-border-dark flex items-center justify-center bg-surface-dark">
<span class="material-symbols-outlined text-slate-400">close</span>
</button>
</header>
<!-- Main Content Area (Background Context) -->
<main class="flex-1 px-6 opacity-40 pointer-events-none">
<div class="mt-4 p-6 rounded-xl bg-surface-dark border border-border-dark">
<div class="h-4 w-24 bg-slate-700 rounded mb-4"></div>
<div class="h-32 w-full bg-slate-800/50 rounded-lg"></div>
</div>
<div class="mt-6 space-y-4">
<div class="h-12 w-full bg-surface-dark rounded-lg"></div>
<div class="h-12 w-full bg-surface-dark rounded-lg"></div>
</div>
</main>
<!-- Quick Log Overlay (Human Edge Design) -->
<div class="fixed inset-0 z-50 flex flex-col justify-end bg-background-dark/80 backdrop-blur-sm">
<div class="w-full bg-background-dark border-t border-border-dark rounded-t-xl p-6 shadow-2xl">
<!-- Pull Bar -->
<div class="flex justify-center mb-6">
<div class="h-1.5 w-12 rounded-full bg-slate-700"></div>
</div>
<div class="mb-8">
<h2 class="text-3xl font-bold text-slate-100">Quick Log</h2>
<p class="text-slate-400 mt-1">Capture your moment in seconds.</p>
</div>
<!-- Primary Action Buttons -->
<div class="grid grid-cols-3 gap-4 mb-8">
<button class="flex flex-col items-center gap-3 p-4 rounded-xl bg-primary/10 border border-primary/20 group">
<div class="h-14 w-14 rounded-full bg-primary flex items-center justify-center text-background-dark shadow-[0_0_20px_rgba(212,255,0,0.3)]">
<span class="material-symbols-outlined text-3xl">photo_camera</span>
</div>
<span class="text-sm font-semibold text-primary">Camera</span>
</button>
<button class="flex flex-col items-center gap-3 p-4 rounded-xl bg-surface-dark border border-border-dark">
<div class="h-14 w-14 rounded-full bg-slate-800 flex items-center justify-center text-slate-200">
<span class="material-symbols-outlined text-3xl">search</span>
</div>
<span class="text-sm font-semibold text-slate-300">Search</span>
</button>
<button class="flex flex-col items-center gap-3 p-4 rounded-xl bg-surface-dark border border-border-dark">
<div class="h-14 w-14 rounded-full bg-slate-800 flex items-center justify-center text-slate-200">
<span class="material-symbols-outlined text-3xl">history</span>
</div>
<span class="text-sm font-semibold text-slate-300">Recent</span>
</button>
</div>
<!-- Real Feel Selectors -->
<div class="space-y-6">
<div class="flex items-center justify-between">
<h3 class="text-lg font-bold text-slate-100 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm fill-icon">circle</span>
                            Real Feel
                        </h3>
<span class="text-xs font-medium text-slate-500 uppercase tracking-widest">Subjective</span>
</div>
<div class="grid grid-cols-1 gap-3">
<!-- Energy Card -->
<div class="flex items-center justify-between p-4 rounded-lg bg-surface-dark border border-border-dark">
<div class="flex items-center gap-4">
<div class="h-10 w-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">bolt</span>
</div>
<div>
<p class="font-bold text-slate-100">Energy</p>
<p class="text-xs text-slate-500">High Vitality</p>
</div>
</div>
<div class="flex gap-1">
<div class="h-2 w-6 rounded-full bg-primary"></div>
<div class="h-2 w-6 rounded-full bg-primary"></div>
<div class="h-2 w-6 rounded-full bg-primary"></div>
<div class="h-2 w-6 rounded-full bg-primary/20"></div>
</div>
</div>
<!-- Mood Card -->
<div class="flex items-center justify-between p-4 rounded-lg bg-surface-dark border border-border-dark">
<div class="flex items-center gap-4">
<div class="h-10 w-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">sentiment_satisfied</span>
</div>
<div>
<p class="font-bold text-slate-100">Mood</p>
<p class="text-xs text-slate-500">Positive / Focused</p>
</div>
</div>
<div class="flex gap-2">
<span class="material-symbols-outlined text-primary fill-icon">star</span>
<span class="material-symbols-outlined text-primary fill-icon">star</span>
<span class="material-symbols-outlined text-primary">star</span>
</div>
</div>
<!-- Digestion Card -->
<div class="flex items-center justify-between p-4 rounded-lg bg-surface-dark border border-border-dark">
<div class="flex items-center gap-4">
<div class="h-10 w-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">invert_colors</span>
</div>
<div>
<p class="font-bold text-slate-100">Digestion</p>
<p class="text-xs text-slate-500">Stable</p>
</div>
</div>
<button class="px-4 py-1.5 rounded-full border border-primary/30 text-xs font-bold text-primary">OPTIMAL</button>
</div>
</div>
</div>
<!-- Submit Area -->
<div class="mt-8 flex gap-3">
<button class="flex-1 py-4 bg-primary text-background-dark font-bold rounded-xl shadow-[0_10px_30px_rgba(212,255,0,0.2)]">
                        Save Entry
                    </button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Visible in background) -->
<div class="mt-auto flex border-t border-border-dark bg-background-dark px-4 pb-8 pt-3">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-icon">add_circle</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Log</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<p class="text-[10px] font-bold uppercase tracking-tighter text-slate-600">Stats</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<p class="text-[10px] font-bold uppercase tracking-tighter text-slate-600">Plan</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-bold uppercase tracking-tighter text-slate-600">User</p>
</a>
</div>
</div>
</body></html>
