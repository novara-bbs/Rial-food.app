<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RIAL - Hidratación Real</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Editorial Tech aesthetic -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'vitality-lime': '#D4FF00',
            'rial-dark': '#0A0A0A',
            'rial-gray': '#1C1C1C',
          },
          fontFamily: {
            serif: ['Playfair Display', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-typography">
    .editorial-title {
      font-size: 3.5rem;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .data-label {
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.7rem;
    }
  </style>
<style data-purpose="animations">
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .animate-pulse-soft {
      animation: pulse-soft 3s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-rial-dark text-white font-sans selection:bg-vitality-lime selection:text-black min-h-screen">
<!-- BEGIN: MainContainer -->
<main class="relative min-h-screen max-w-md mx-auto overflow-hidden flex flex-col">
<!-- BEGIN: BackgroundAesthetic -->
<div class="absolute inset-0 z-0 opacity-40">
<img alt="Editorial background of water" class="w-full h-full object-cover grayscale contrast-125" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxmV2CSWafoH6kVh_r-NUgb3kX4V6R8pf5Aqs4IMFJ3tyjZSylQWTuDfWnpdeA832rmZsw-4KVNEcaFcTassQEUO4bON8soZ4YhNsJWAqZPHzG4GScoTioBtMj9pwA9k4_o6QnW1piIaV4vcvA6IKRZ8SA4bvoyMt1MrtxVspRZw4uP-d8QWF8MidV4VX8VqubB-wOKpyb7MfXZy-mMzUkylmK6-MgO3IiMuDbauf-JAvBXYlnzxfei9qkMlpv9xI4jyKFetSJGt2t"/>
<div class="absolute inset-0 bg-gradient-to-b from-rial-dark/80 via-rial-dark/40 to-rial-dark"></div>
</div>
<!-- END: BackgroundAesthetic -->
<!-- BEGIN: Header -->
<header class="relative z-10 p-6 pt-12 flex justify-between items-start">
<div>
<span class="data-label text-vitality-lime font-semibold">RIAL APP</span>
<h1 class="editorial-title font-serif mt-2 italic">Hidratación <br/><span class="not-italic">Real</span></h1>
</div>
<button class="w-10 h-10 border border-white/20 rounded-full flex items-center justify-center hover:bg-white/10 transition-colors">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</button>
</header>
<!-- END: Header -->
<!-- BEGIN: CircularVisualization -->
<section class="relative z-10 flex-grow flex flex-col items-center justify-center py-8">
<!-- Outer Progress Ring -->
<div class="relative w-72 h-72 flex items-center justify-center" data-purpose="intake-visualization">
<svg class="w-full h-full -rotate-90">
<!-- Background circle -->
<circle class="text-white/10" cx="144" cy="144" fill="transparent" r="130" stroke="currentColor" stroke-width="2"></circle>
<!-- Progress circle -->
<circle class="text-vitality-lime transition-all duration-1000 ease-out" cx="144" cy="144" fill="transparent" r="130" stroke="currentColor" stroke-dasharray="816" stroke-dashoffset="245" stroke-width="6"></circle>
</svg>
<!-- Central Content -->
<div class="absolute inset-0 flex flex-col items-center justify-center text-center">
<span class="data-label text-white/50 mb-1">Actual</span>
<span class="text-6xl font-serif font-light">1.8</span>
<span class="text-xl font-serif italic text-vitality-lime">Litros</span>
<div class="mt-4 px-3 py-1 bg-white/5 rounded-full backdrop-blur-sm border border-white/10">
<span class="text-[10px] uppercase tracking-[0.2em] font-medium text-white/70">Meta: 2.5L</span>
</div>
</div>
</div>
</section>
<!-- END: CircularVisualization -->
<!-- BEGIN: InsightSection -->
<section class="relative z-10 px-6 mb-8">
<div class="bg-rial-gray/80 backdrop-blur-md border-l-2 border-vitality-lime p-5 rounded-r-xl" data-purpose="real-feel-insight">
<h3 class="data-label text-vitality-lime mb-2 font-bold tracking-widest italic">Real Feel Insight</h3>
<p class="font-serif text-lg leading-relaxed text-white/90">
          Tu energía está en <span class="text-vitality-lime underline underline-offset-4">pico óptimo</span>. Mantener este ritmo previene la fatiga cognitiva de las 4 PM.
        </p>
</div>
</section>
<!-- END: InsightSection -->
<!-- BEGIN: QuickAddActions -->
<section class="relative z-10 px-6 pb-12">
<div class="flex gap-4" data-purpose="hydration-controls">
<!-- Add Glass -->
<button class="group flex-1 flex flex-col items-center p-6 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl transition-all active:scale-95">
<div class="w-8 h-8 mb-4 flex items-center justify-center">
<svg class="w-full h-full text-vitality-lime opacity-80 group-hover:opacity-100" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24">
<path d="M19 3H5L6.5 21H17.5L19 3Z"></path>
<path d="M5 7H19" stroke-dasharray="2 2"></path>
</svg>
</div>
<span class="data-label text-white/40 group-hover:text-white/80">Vaso</span>
<span class="text-xl font-serif">250ml</span>
</button>
<!-- Add Bottle -->
<button class="group flex-1 flex flex-col items-center p-6 bg-vitality-lime text-black rounded-2xl transition-all hover:brightness-110 active:scale-95">
<div class="w-8 h-8 mb-4 flex items-center justify-center">
<svg class="w-full h-full" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24">
<path d="M9 3H15V6H9V3Z"></path>
<path d="M7 6H17L18 21H6L7 6Z"></path>
<path d="M10 10H14" stroke-opacity="0.3"></path>
</svg>
</div>
<span class="data-label opacity-60 font-bold">Botella</span>
<span class="text-xl font-serif font-bold">500ml</span>
</button>
</div>
</section>
<!-- END: QuickAddActions -->
<!-- BEGIN: BottomNavigation -->
<nav class="relative z-10 bg-rial-dark/90 backdrop-blur-xl border-t border-white/5 py-4 px-10 flex justify-between items-center" data-purpose="tab-bar">
<button class="text-vitality-lime">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
</button>
<button class="text-white/30 hover:text-white transition-colors">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button class="text-white/30 hover:text-white transition-colors">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button class="text-white/30 hover:text-white transition-colors">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</nav>
<!-- END: BottomNavigation -->
</main>
<!-- END: MainContainer -->
</body></html>
