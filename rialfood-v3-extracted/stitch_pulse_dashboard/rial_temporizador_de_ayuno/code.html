<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Header -->
<header class="flex items-center justify-between px-6 py-4">
<button class="p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">close</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-sm font-bold uppercase tracking-widest text-primary">Rial Fasting</h1>
<p class="text-[10px] font-medium opacity-60">SESSION ACTIVE</p>
</div>
<button class="p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">more_horiz</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-6 gap-8">
<!-- Large Circular Progress Timer -->
<div class="relative flex items-center justify-center w-72 h-72 sm:w-80 sm:h-80">
<!-- Progress Circle Background -->
<svg class="w-full h-full">
<circle class="text-primary/10 stroke-current" cx="50%" cy="50%" fill="transparent" r="135" stroke-width="8"></circle>
<!-- Progress Circle Foreground -->
<circle class="text-primary stroke-current progress-ring-circle" cx="50%" cy="50%" fill="transparent" r="135" stroke-linecap="round" stroke-width="8" style="stroke-dasharray: 848.23; stroke-dashoffset: 280;"></circle>
</svg>
<!-- Timer Labels -->
<div class="absolute inset-0 flex flex-col items-center justify-center text-center">
<span class="text-xs font-semibold tracking-tighter uppercase opacity-60">Elapsed Time</span>
<span class="text-6xl font-extrabold tracking-tight my-1">14:22</span>
<div class="flex items-center gap-1 text-primary">
<span class="material-symbols-outlined text-sm">bolt</span>
<span class="text-sm font-bold">Fat Burning</span>
</div>
</div>
</div>
<!-- Status & Goal Info -->
<div class="w-full max-w-sm space-y-6">
<div class="flex justify-between items-end border-b border-primary/10 pb-4">
<div>
<p class="text-xs font-medium opacity-50 uppercase mb-1">Target Window</p>
<p class="text-lg font-bold">16:8 Protocol</p>
</div>
<div class="text-right">
<p class="text-xs font-medium opacity-50 uppercase mb-1">Remaining</p>
<p class="text-lg font-bold">01:37:45</p>
</div>
</div>
<!-- Stage Progress Indicator (Editorial Style) -->
<div class="bg-primary/5 dark:bg-primary/10 rounded-xl p-5 border border-primary/20">
<div class="flex items-center gap-3 mb-3">
<div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined">local_fire_department</span>
</div>
<div>
<h3 class="font-bold text-base leading-tight">Metabolic Shift</h3>
<p class="text-xs opacity-70">Your body is utilizing stored glycogen.</p>
</div>
</div>
<!-- Mini Progress Bar -->
<div class="w-full bg-primary/20 h-1.5 rounded-full overflow-hidden">
<div class="bg-primary h-full w-3/4"></div>
</div>
<div class="flex justify-between mt-2 text-[10px] font-bold uppercase tracking-wider opacity-60">
<span>Ketosis Stage</span>
<span>Autophagy In 4h</span>
</div>
</div>
</div>
<!-- Interaction Buttons -->
<div class="w-full max-w-sm grid grid-cols-2 gap-4 pt-4">
<button class="flex items-center justify-center gap-2 py-4 px-6 rounded-xl border-2 border-primary/20 font-bold text-slate-800 dark:text-slate-200 hover:bg-primary/5 transition-all">
<span class="material-symbols-outlined text-xl">edit_calendar</span>
                Edit Window
            </button>
<button class="flex items-center justify-center gap-2 py-4 px-6 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] transition-all active:scale-95">
<span class="material-symbols-outlined text-xl">stop_circle</span>
                End Fast
            </button>
</div>
</main>
<!-- Bottom Navigation Bar (Customized from component) -->
<nav class="mt-auto border-t border-primary/10 bg-background-light dark:bg-background-dark/80 backdrop-blur-md px-6 pb-8 pt-3">
<div class="flex justify-between items-center max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-[1]">timer</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Fast</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Stats</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Learn</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Profile</span>
</a>
</div>
</nav>
<!-- Background Decorative Element (Subtle Gradient) -->
<div class="fixed -top-24 -right-24 size-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -bottom-24 -left-24 size-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
