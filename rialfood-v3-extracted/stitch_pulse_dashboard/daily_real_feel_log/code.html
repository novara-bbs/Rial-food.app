<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ddff00",
                        "background-light": "#f8f8f5",
                        "background-dark": "#121407",
                        "surface-dark": "#1c1f0e",
                        "border-dark": "#2d3216",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #ddff00;
            cursor: pointer;
            border-radius: 50%;
            border: 4px solid #121407;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 sticky top-0 z-10 border-b border-slate-200 dark:border-border-dark justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<div class="flex flex-col items-center">
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Daily Summary</h2>
<p class="text-xs text-slate-500 dark:text-primary/70 font-medium">REAL FEEL LOG</p>
</div>
<div class="flex w-10 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-lg h-10 w-10 bg-transparent text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">calendar_today</span>
</button>
</div>
</header>
<main class="flex-1 overflow-y-auto p-4 space-y-8 pb-32">
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-widest mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">psychology</span> Mindset
            </h3>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border-2 border-primary bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">check_circle</span>
<span class="text-xs font-bold">Balanced</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-border-dark bg-surface-dark text-slate-400 hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-3xl">warning</span>
<span class="text-xs font-bold">Stressed</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-border-dark bg-surface-dark text-slate-400 hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-3xl">cloud</span>
<span class="text-xs font-bold">Calm</span>
</button>
</div>
</section>
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-widest mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">bolt</span> Energy
            </h3>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-border-dark bg-surface-dark text-slate-400 hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-3xl">keyboard_double_arrow_up</span>
<span class="text-xs font-bold">High</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-border-dark bg-surface-dark text-slate-400 hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-3xl">keyboard_double_arrow_down</span>
<span class="text-xs font-bold">Low</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border-2 border-primary bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">horizontal_rule</span>
<span class="text-xs font-bold">Steady</span>
</button>
</div>
</section>
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-widest mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">eco</span> Digestion
            </h3>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-border-dark bg-surface-dark text-slate-400 hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-3xl">spa</span>
<span class="text-xs font-bold">Clean</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-border-dark bg-surface-dark text-slate-400 hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-3xl">error_outline</span>
<span class="text-xs font-bold">Bloated</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border border-border-dark bg-surface-dark text-slate-400 hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-3xl">opacity</span>
<span class="text-xs font-bold">Sensitive</span>
</button>
</div>
</section>
<section class="bg-surface-dark p-6 rounded-2xl border border-border-dark shadow-xl">
<div class="flex justify-between items-center mb-6">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">favorite</span> Overall Vitality
                </h3>
<span class="text-primary font-bold text-2xl">8/10</span>
</div>
<div class="relative px-2">
<input class="w-full h-2 bg-border-dark rounded-lg appearance-none cursor-pointer accent-primary" max="10" min="1" type="range" value="8"/>
<div class="flex justify-between mt-4 text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
<span>Depleted</span>
<span>Optimal</span>
</div>
</div>
</section>
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-widest mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">edit_note</span> Real Notes
            </h3>
<textarea class="w-full bg-surface-dark border border-border-dark rounded-xl p-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-primary/50 min-h-[120px] resize-none font-display" placeholder="Qualitative insights from today..."></textarea>
</section>
<div class="pb-10">
<button class="w-full bg-primary text-background-dark font-bold py-4 rounded-xl text-lg shadow-[0_0_20px_rgba(221,255,0,0.2)] active:scale-[0.98] transition-transform">
                Save Daily Log
            </button>
</div>
</main>
<nav class="fixed bottom-0 left-0 right-0 z-20 border-t border-border-dark bg-background-dark/80 backdrop-blur-lg px-4 pb-6 pt-3">
<div class="flex items-center justify-between max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_square</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Log</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Stats</p>
</a>
<div class="flex flex-col items-center -mt-8">
<div class="bg-primary p-3 rounded-full shadow-[0_0_15px_rgba(221,255,0,0.4)]">
<span class="material-symbols-outlined text-background-dark text-3xl font-bold">add</span>
</div>
</div>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">event_note</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Plan</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Profile</p>
</a>
</div>
</nav>
</body></html>
