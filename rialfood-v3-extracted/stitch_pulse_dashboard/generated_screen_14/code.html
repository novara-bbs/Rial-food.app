<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>RIAL Scanner - AI Receipt Scan</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            vitalityLime: '#DFFF00',
            darkSurface: '#0A0A0A',
            glassBg: 'rgba(10, 10, 10, 0.7)',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
<!-- END: External Scripts -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="layout-animations">
    @keyframes pulse-scan {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .animate-scan {
      animation: pulse-scan 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .scanner-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, #DFFF00, transparent);
      box-shadow: 0 0 15px #DFFF00;
      width: 100%;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      animation: scan-move 3s linear infinite;
    }
    @keyframes scan-move {
      0% { top: 10%; }
      50% { top: 90%; }
      100% { top: 10%; }
    }
    .blur-glass {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-black text-white font-sans overflow-hidden antialiased">
<!-- BEGIN: Camera Viewport Container -->
<main class="relative h-screen w-full flex flex-col overflow-hidden">
<!-- Background Camera Feed Placeholder -->
<div class="absolute inset-0 z-0 bg-neutral-900">
<img alt="Camera Feed Placeholder" class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAek5m4JroWSUpQfdXzt9LE2OiyF_LSZ18JFS648v36mw4GEevsuWZwk6VEkfyAlUDxk5TmVN-Ta-CuMKi19PHO0vItAkLeY64eVuLt6GE-J0uImmiXIcKVFR_89_XGnjriN7atDLzuLZqcmgajda0Jn9I1_zdaLfzWbFcTPcqxhZTaOV-dIz-fN0fiQ3R_4dUy__yeS1UfEiWyybC94cANEX5Zm6ITMWzEtzqaUB8_aNnkZUR2EEiA_D7mLDlY6kzuBgKGNh_3A3r7"/>
<!-- Scanning Line Animation -->
<div class="scanner-line z-10"></div>
</div>
<!-- BEGIN: Header Navigation -->
<header class="relative z-50 flex items-center justify-between px-6 pt-14 pb-6 blur-glass bg-gradient-to-b from-black/80 to-transparent">
<button aria-label="Close Scanner" class="p-2 -ml-2 text-white/80 hover:text-white transition-colors">
<svg fill="none" height="24" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<div class="flex flex-col items-center">
<h1 class="text-xs font-mono tracking-[0.3em] uppercase text-vitalityLime mb-1">RIAL Scanner</h1>
<p class="text-[10px] font-medium tracking-widest text-white/50 uppercase">Precision Mode v2.4</p>
</div>
<button aria-label="Help" class="p-2 -mr-2 text-white/80 hover:text-white transition-colors">
<svg fill="none" height="24" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</header>
<!-- END: Header Navigation -->
<!-- BEGIN: Viewfinder Guides -->
<section class="flex-grow relative z-20 px-8 py-10 flex items-center justify-center" data-purpose="scanner-viewfinder">
<!-- Corners -->
<div class="absolute inset-x-8 inset-y-20 border-2 border-transparent pointer-events-none">
<div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-vitalityLime"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-vitalityLime"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-vitalityLime"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-vitalityLime"></div>
</div>
<!-- AI Detection Tags -->
<div class="w-full h-full relative" data-purpose="ai-overlay">
<!-- Tag 1 -->
<div class="absolute top-1/4 right-4 flex flex-col items-end animate-scan" style="animation-delay: 0.2s;">
<div class="bg-vitalityLime text-black px-2 py-0.5 text-[8px] font-mono font-bold rounded-sm mb-1">PRODUCT DETECTED</div>
<div class="h-[1px] w-12 bg-vitalityLime/50"></div>
<p class="text-[10px] font-mono mt-1 text-white shadow-sm">ORGANIC KALE ... $4.99</p>
</div>
<!-- Tag 2 -->
<div class="absolute bottom-1/3 left-4 flex flex-col items-start animate-scan" style="animation-delay: 1.1s;">
<div class="bg-white/10 blur-glass border border-white/20 text-white px-2 py-0.5 text-[8px] font-mono font-bold rounded-sm mb-1">WEIGHT EXTRACTED</div>
<div class="h-[1px] w-16 bg-white/30"></div>
<p class="text-[10px] font-mono mt-1 text-white shadow-sm">0.852 kg @ $1.20/kg</p>
</div>
<!-- Tag 3 (Center Focus) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none">
<div class="w-12 h-12 border border-vitalityLime/30 rounded-full flex items-center justify-center animate-ping opacity-20"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-vitalityLime rounded-full"></div>
</div>
</div>
</section>
<!-- END: Viewfinder Guides -->
<!-- BEGIN: Footer Controls -->
<footer class="relative z-50 px-8 pb-16 pt-8 blur-glass bg-gradient-to-t from-black/90 to-transparent">
<div class="flex items-center justify-between mb-8">
<!-- Flash Toggle -->
<button class="flex flex-col items-center gap-1 group" data-purpose="camera-setting" id="flash-toggle">
<div class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center group-hover:bg-white/10 transition-all">
<svg fill="none" height="18" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg">
<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<span class="text-[9px] font-mono uppercase tracking-tighter text-white/60">Flash Off</span>
</button>
<!-- Main Shutter -->
<button class="relative group" data-purpose="shutter-action">
<div class="absolute inset-0 rounded-full bg-vitalityLime opacity-20 blur-md group-active:scale-125 transition-transform"></div>
<div class="relative w-20 h-20 rounded-full border-[3px] border-white p-1.5 transition-transform group-active:scale-95">
<div class="w-full h-full rounded-full bg-white group-hover:bg-vitalityLime transition-colors"></div>
</div>
</button>
<!-- Gallery/Recent -->
<button class="flex flex-col items-center gap-1 group" data-purpose="camera-gallery">
<div class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center overflow-hidden group-hover:bg-white/10 transition-all">
<img alt="Recent" class="w-full h-full object-cover opacity-50" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaL1SDcGZXwSRlm6SeAG3F0JJNjbM8XRstVzcDld30s353pEkCLtIxsbdIlgvftaKZnHLqxI-anDMt6ylQ-Qswe0jHB84LONXRH30slkTCKKJTVJ46snn85D2kW1_lO3-nJsQbw4GWM-ouepT1o5p7nNEPSiJ6FGAjmdXpfXzbMfzci86xv8Y6IyYz65g-RJ6vW4RA-YCBiaVKRCCocXODfjvmQBD743if3BTZ_KHTf6d9W0ci1B2EjXqXEJQMKlDOi1xnT9pzvDMk"/>
</div>
<span class="text-[9px] font-mono uppercase tracking-tighter text-white/60">Recent</span>
</button>
</div>
<!-- Mode Selector -->
<nav class="flex justify-center gap-6">
<span class="text-[10px] font-mono font-bold text-vitalityLime tracking-widest uppercase cursor-default">Receipt</span>
<span class="text-[10px] font-mono font-bold text-white/30 tracking-widest uppercase cursor-pointer hover:text-white/60 transition-colors">Bulk</span>
<span class="text-[10px] font-mono font-bold text-white/30 tracking-widest uppercase cursor-pointer hover:text-white/60 transition-colors">Barcode</span>
</nav>
</footer>
<!-- END: Footer Controls -->
</main>
<!-- END: Camera Viewport Container -->
<!-- BEGIN: Logic Scripts -->
<script data-purpose="ui-interactions">
    // Mock interaction for flash toggle
    const flashBtn = document.getElementById('flash-toggle');
    let flashOn = false;
    
    flashBtn.addEventListener('click', () => {
      flashOn = !flashOn;
      const icon = flashBtn.querySelector('svg');
      const text = flashBtn.querySelector('span');
      const circle = flashBtn.querySelector('div');
      
      if(flashOn) {
        text.innerText = 'Flash On';
        text.classList.replace('text-white/60', 'text-vitalityLime');
        circle.classList.add('bg-vitalityLime/20', 'border-vitalityLime');
        icon.classList.add('text-vitalityLime');
      } else {
        text.innerText = 'Flash Off';
        text.classList.replace('text-vitalityLime', 'text-white/60');
        circle.classList.remove('bg-vitalityLime/20', 'border-vitalityLime');
        icon.classList.remove('text-vitalityLime');
      }
    });
  </script>
<!-- END: Logic Scripts -->
</body></html>
