<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ddff00",
                        "background-light": "#f8f8f5",
                        "background-dark": "#20230f",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>RIAL - Post-Meal Log</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation -->
<nav class="flex items-center p-4 justify-between bg-background-light dark:bg-background-dark sticky top-0 z-10 border-b border-primary/10">
<div class="flex size-12 shrink-0 items-center justify-start cursor-pointer hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Post-Meal Log</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center rounded-full size-10 bg-primary text-background-dark hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined font-bold">check</span>
</button>
</div>
</nav>
<main class="flex-1 flex flex-col px-6 py-8 max-w-lg mx-auto w-full">
<!-- Header Section -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center p-3 mb-4 rounded-2xl bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl">restaurant</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight tracking-tight mb-2">How did this meal land?</h1>
<p class="text-slate-500 dark:text-primary/60 text-sm font-medium">Log your "Real Feel" to optimize your RIAL bio-rhythm.</p>
</div>
<!-- Energy Section -->
<section class="mb-10">
<div class="flex items-center justify-between mb-4 px-1">
<h4 class="text-primary text-xs font-bold tracking-[0.2em] uppercase">Energy Levels</h4>
<span class="text-[10px] text-slate-400">SELECT ONE</span>
</div>
<div class="grid grid-cols-3 gap-3">
<label class="group cursor-pointer">
<input checked="" class="hidden peer" name="energy" type="radio"/>
<div class="flex flex-col items-center justify-center gap-3 py-6 px-2 rounded-2xl bg-slate-100 dark:bg-primary/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/10 transition-all duration-200">
<span class="text-3xl grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all">🚀</span>
<span class="text-sm font-bold text-slate-600 dark:text-slate-400 peer-checked:text-primary">Boost</span>
</div>
</label>
<label class="group cursor-pointer">
<input class="hidden peer" name="energy" type="radio"/>
<div class="flex flex-col items-center justify-center gap-3 py-6 px-2 rounded-2xl bg-slate-100 dark:bg-primary/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/10 transition-all duration-200">
<span class="text-3xl grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all">😐</span>
<span class="text-sm font-bold text-slate-600 dark:text-slate-400 peer-checked:text-primary">Neutral</span>
</div>
</label>
<label class="group cursor-pointer">
<input class="hidden peer" name="energy" type="radio"/>
<div class="flex flex-col items-center justify-center gap-3 py-6 px-2 rounded-2xl bg-slate-100 dark:bg-primary/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/10 transition-all duration-200">
<span class="text-3xl grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all">📉</span>
<span class="text-sm font-bold text-slate-600 dark:text-slate-400 peer-checked:text-primary">Crash</span>
</div>
</label>
</div>
</section>
<!-- Digestion Section -->
<section class="mb-10">
<div class="flex items-center justify-between mb-4 px-1">
<h4 class="text-primary text-xs font-bold tracking-[0.2em] uppercase">Digestion</h4>
<span class="text-[10px] text-slate-400">SELECT ONE</span>
</div>
<div class="grid grid-cols-3 gap-3">
<label class="group cursor-pointer">
<input class="hidden peer" name="digestion" type="radio"/>
<div class="flex flex-col items-center justify-center gap-3 py-6 px-2 rounded-2xl bg-slate-100 dark:bg-primary/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/10 transition-all duration-200">
<span class="text-3xl grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all">🍃</span>
<span class="text-sm font-bold text-slate-600 dark:text-slate-400 peer-checked:text-primary">Light</span>
</div>
</label>
<label class="group cursor-pointer">
<input checked="" class="hidden peer" name="digestion" type="radio"/>
<div class="flex flex-col items-center justify-center gap-3 py-6 px-2 rounded-2xl bg-slate-100 dark:bg-primary/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/10 transition-all duration-200">
<span class="text-3xl grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all">✨</span>
<span class="text-sm font-bold text-slate-600 dark:text-slate-400 peer-checked:text-primary">Perfect</span>
</div>
</label>
<label class="group cursor-pointer">
<input class="hidden peer" name="digestion" type="radio"/>
<div class="flex flex-col items-center justify-center gap-3 py-6 px-2 rounded-2xl bg-slate-100 dark:bg-primary/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/10 transition-all duration-200">
<span class="text-3xl grayscale group-hover:grayscale-0 peer-checked:grayscale-0 transition-all">🧱</span>
<span class="text-sm font-bold text-slate-600 dark:text-slate-400 peer-checked:text-primary">Heavy</span>
</div>
</label>
</div>
</section>
<!-- Quick Tags Section -->
<section class="mb-12">
<div class="flex items-center justify-between mb-4 px-1">
<h4 class="text-primary text-xs font-bold tracking-[0.2em] uppercase">Quick Tags</h4>
<span class="text-[10px] text-slate-400">MULTI-SELECT</span>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 text-sm font-medium bg-transparent hover:bg-primary/10 transition-colors">🧠 Mental Clarity</button>
<button class="px-4 py-2 rounded-full border border-primary bg-primary/20 text-primary text-sm font-bold">🔥 Heartburn</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 text-sm font-medium bg-transparent hover:bg-primary/10 transition-colors">💤 Sleepy</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 text-sm font-medium bg-transparent hover:bg-primary/10 transition-colors">🎈 Bloated</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 text-sm font-medium bg-transparent hover:bg-primary/10 transition-colors">🔋 Focused</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 text-sm font-medium bg-transparent hover:bg-primary/10 transition-colors">👅 Aftertaste</button>
</div>
</section>
<!-- Footer / Submit -->
<div class="mt-auto pt-6 flex flex-col gap-4">
<button class="w-full h-14 bg-primary text-background-dark font-bold text-lg rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Log Experience
                    <span class="material-symbols-outlined">trending_up</span>
</button>
<p class="text-center text-slate-500 dark:text-slate-400 text-xs">Logged at 12:45 PM • Post-Meal Analysis</p>
</div>
</main>
<!-- Decorative Pattern (Organic Tech Aesthetic) -->
<div class="fixed bottom-0 left-0 w-full h-32 opacity-10 pointer-events-none z-[-1] overflow-hidden">
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 400 100">
<path class="text-primary" d="M0,50 Q100,20 200,50 T400,50 V100 H0 Z" fill="currentColor"></path>
</svg>
</div>
</div>
</body></html>
