<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007dff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Post-Action Success</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Action Logged</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-xl h-10 w-10 bg-primary/10 text-primary">
<span class="material-symbols-outlined text-[20px]">share</span>
</button>
</div>
</div>
<!-- Success Visual Hero -->
<div class="px-4 py-3 relative">
<div class="relative w-full aspect-square max-h-[320px] rounded-xl overflow-hidden bg-gradient-to-br from-primary/20 via-primary/5 to-transparent border border-primary/20 group">
<!-- Decorative Glows -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/30 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-20 -left-20 w-64 h-64 bg-primary/20 rounded-full blur-[80px]"></div>
<!-- Main Image/Icon -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="relative">
<div class="absolute inset-0 bg-primary/40 blur-3xl rounded-full"></div>
<div class="relative bg-background-dark border border-primary/40 p-8 rounded-full shadow-[0_0_40px_rgba(0,125,255,0.3)]">
<span class="material-symbols-outlined text-primary text-7xl font-light">verified_user</span>
</div>
</div>
</div>
<!-- Floating Achievement Badge -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/10 backdrop-blur-xl border border-white/20 px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-yellow-400 text-sm">stars</span>
<span class="text-xs font-bold uppercase tracking-widest">Action Verified</span>
</div>
</div>
</div>
<!-- Feedback Content -->
<div class="px-6 pt-4 text-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-4xl font-bold leading-tight mb-2">Real Match!</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed px-4">
                Incredible work! Your activity perfectly aligns with your <span class="text-primary font-semibold">Human Edge</span> profile goals.
            </p>
</div>
<!-- Match Score Card -->
<div class="flex flex-wrap gap-4 p-6">
<div class="flex min-w-[158px] flex-1 flex-col gap-3 rounded-xl p-6 bg-primary/5 border border-primary/10 relative overflow-hidden group">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-4xl">analytics</span>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium uppercase tracking-wider">Match Score</p>
<div class="flex items-baseline gap-2">
<p class="text-slate-900 dark:text-slate-100 tracking-tight text-5xl font-bold leading-tight">98%</p>
<p class="text-emerald-500 text-sm font-bold flex items-center">
<span class="material-symbols-outlined text-sm">arrow_upward</span>12%
                    </p>
</div>
<div class="w-full h-1 bg-slate-200 dark:bg-slate-800 rounded-full mt-2 overflow-hidden">
<div class="h-full bg-primary w-[98%] rounded-full shadow-[0_0_8px_rgba(0,125,255,0.6)]"></div>
</div>
</div>
</div>
<!-- Daily Goal Impact -->
<div class="mx-6 mb-8 p-5 rounded-xl bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">target</span>
</div>
<div>
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Daily Progress</p>
<p class="text-sm font-bold">Flow Mastery</p>
</div>
</div>
<div class="text-right">
<p class="text-sm font-bold text-primary">850/1000</p>
<p class="text-[10px] text-emerald-500 font-bold uppercase tracking-tighter">+120 pts earned</p>
</div>
</div>
<div class="grid grid-cols-10 gap-1 h-2">
<div class="col-span-8 bg-primary rounded-full"></div>
<div class="col-span-1 bg-primary/30 rounded-full"></div>
<div class="col-span-1 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-auto p-6 pt-0 space-y-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                Done
                <span class="material-symbols-outlined">chevron_right</span>
</button>
<button class="w-full bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 font-medium py-3 rounded-xl transition-all">
                View detailed analysis
            </button>
</div>
<!-- Bottom Spacer -->
<div class="h-4"></div>
</div>
</body></html>
